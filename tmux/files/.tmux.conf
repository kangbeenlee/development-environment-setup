# Tmux configuration

set -g prefix C-s
set -g escape-time 500
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g @continuum-restore 'on'

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Status bar
set -g status-position bottom
set -g status-interval 1
set -g status-left "#{session_name} "
set -g status-left-length 50
set -g status-right "#{host} CPU: #{cpu_percentage} RAM: #{ram_percentage} GPU: #{gpu_percentage} %Y-%m-%d %H:%M"
set -g status-right-length 100

# Theme
set -g status-style bg=black,fg=green
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=green
set -g message-style bg=black,fg=green
setw -g window-status-format "#[fg=colour237,bg=black]#[fg=white,bg=colour237] #I #[fg=white,bg=colour237]#[fg=white,bg=colour237] #W #[fg=colour237,bg=black]"
setw -g window-status-current-format "#[fg=black,bg=green]#[fg=black,bg=green] #I #[fg=black,bg=green]#[fg=black,bg=green,bold] #W #[fg=green,bg=black]"

# # Thema
# set -g @catppuccin_flavor 'mocha' # Catppuccin thema version

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmuxai'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
# set -g @plugin 'catppuccin/tmux'
# set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'hiroppy/tmux-agent-sidebar'

# TPM must stay at the bottom
run '~/.tmux/plugins/tpm/tpm'
